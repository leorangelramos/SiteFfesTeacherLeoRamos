    <script type="application/ld+json">

      "@type": "ProfilePage",

    <link rel="stylesheet" href="/CSS/style-app.css">

    <style>
        .dashboard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 20px;
        }

        .xp-display {
            background: rgba(0, 0, 0, 0.6); 
            border: 2px solid #FFD700;
            border-radius: 24px; 
            padding: 50px 40px; 
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); 
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .xp-number { 
            font-size: 5rem; 
            font-weight: 900; 
            color: #00e676; 
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.6); 
            line-height: 1;
            margin: 15px 0;
        }

        .btn-voltar { 
            display: block; 
            width: 100%;
            max-width: 300px;
            padding: 15px 30px; 
            background: transparent; 
            border: 2px solid #FFD700; 
            color: #FFD700; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 900; 
            text-align: center; 
            text-transform: uppercase; 
            transition: all 0.3s; 
        }

        .btn-voltar:hover { 
            background: #FFD700; 
            color: #000; 
            box-shadow: 0 0 15px #FFD700;
        }
    </style>
</head>

<body>
    <header class="glass-header app-header" style="text-align: center; padding: 20px;">
        <h1 style="color: #fff; margin: 0;">MINHA <span style="color: #FFD700;">CONTA</span></h1>
    </header>

    <main class="dashboard-container">
        <div class="xp-display">
            <div style="font-size: 1.2rem; color: #fff; text-transform: uppercase; letter-spacing: 1px;">Total Acumulado</div>
            <div class="xp-number"><span id="user-xp-display">0</span></div>
            <div style="color: #FFD700; font-weight: 900; font-size: 1.5rem; letter-spacing: 2px;">XP</div>
        </div>

        <a href="indexpasta015.html" class="btn-voltar">⬅ Voltar ao Menu</a>
    </main>

    <script>
        // Lê o XP do cache global do aparelho
        let currentXP = parseInt(localStorage.getItem('ffes_xp') || 0);
        document.getElementById('user-xp-display').innerText = currentXP.toLocaleString('pt-BR');
    </script>

</body>
